services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      - ORACLE_PASSWORD=oracle
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - fdb-network

  postgres-db:
    image: postgres:14
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=olist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fdb-network

  postgrest-api:
    image: postgrest/postgrest:latest
    container_name: postgrest-api
    environment:
      - PGRST_DB_URI=postgres://postgres:postgres@postgres-db:5432/olist_db
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres-db
    networks:
      - fdb-network

  mongo-db:
    image: mongo:6
    container_name: mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - fdb-network

  restheart-api:
    image: softinstigate/restheart:8
    container_name: restheart-api
    environment:
      - MONGO_URI=mongodb://mongo-db:27017
      - 'RHO=/mclient/connection-string->"mongodb://mongo-db:27017";/mongo/mongo-mounts[1]->{"what":"*","where":"/"};/http-listener/host->"0.0.0.0"'
    ports:
      - "8081:8080"
    depends_on:
      - mongo-db
    networks:
      - fdb-network

  fdb-api:
    build: ./fdb-api
    container_name: fdb-api
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/XEPDB1
    ports:
      - "8080:8080"
    depends_on:
      - oracle-db
    networks:
      - fdb-network

networks:
  fdb-network:
    driver: bridge

volumes:
  oracle-data:
  postgres-data:
  mongo-data:
